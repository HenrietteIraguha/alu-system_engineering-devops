<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Minion Lost!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body style="margin:0; padding:0; min-height:100vh; background-color:#ffffff; font-family:'Patrick Hand', cursive; display:flex; flex-direction:column; align-items:center; justify-content:center;">

  <!-- Top stripe -->
  <div style="width:100%; height:12px; background: linear-gradient(to right, #f9e44a, #2b5ba8, #f9e44a, #2b5ba8, #f9e44a); position:fixed; top:0; left:0;"></div>

  <!-- Card -->
  <div style="background:#ffffff; border-radius:24px; border: 3px solid #e8e8e8; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding:3rem 2.5rem; max-width:600px; width:90%; text-align:center; margin-top:24px;">

    <!-- ⬇️ REPLACE src="YOUR_IMAGE_HERE.png" with your minion image filename -->
    <img src="" alt="Confused Minion" style="width:200px; height:auto; margin-bottom:1.5rem;"/>

    <!-- 404 -->
    <div style="font-family:'Bangers', cursive; font-size:clamp(5rem,20vw,8rem); color:#f9e44a; line-height:1; text-shadow: 4px 4px 0 #2b5ba8; letter-spacing:0.05em;">404</div>

    <!-- Subtitle -->
    <div style="font-family:'Bangers', cursive; font-size:1.4rem; color:#2b5ba8; letter-spacing:0.12em; margin-top:0.2rem; margin-bottom:1rem;">PAGE NOT FOUND</div>

    <!-- Required string badge -->
    <div style="display:inline-block; background:#f9e44a; color:#2b5ba8; font-family:'Bangers', cursive; font-size:1.15rem; letter-spacing:0.08em; padding:0.4rem 1.6rem; border-radius:50px; margin-bottom:1.5rem; border:2px solid #2b5ba8;">Ceci n'est pas une page</div>

    <!-- Message -->
    <p style="font-size:1.1rem; color:#444; margin-bottom:0.5rem;">Whoops! The minion went looking for this page...</p>
    <p style="font-size:1rem; color:#888; margin-bottom:2rem;">He checked under the bananas. Behind Gru's rocket. Even inside the overalls pocket. <strong>It's not here.</strong> 🍌</p>

    <!-- Divider -->
    <div style="border-top: 2px dashed #f9e44a; margin-bottom:2rem;"></div>

    <!-- Button -->
    <a href="/" style="display:inline-block; background:#2b5ba8; color:#f9e44a; font-family:'Bangers', cursive; font-size:1.2rem; letter-spacing:0.15em; padding:0.8rem 2.8rem; border-radius:50px; text-decoration:none; box-shadow: 3px 3px 0 #1a3a6e;">🏠 Take Me Home</a>

  </div>

  <!-- Footer -->
  <div style="margin-top:2rem; margin-bottom:1.5rem; font-size:0.85rem; color:#aaa; text-align:center;">
    Minion Error Department &nbsp;·&nbsp; <em>"Bello!"</em>
  </div>

  <!-- Bottom stripe -->
  <div style="width:100%; height:12px; background: linear-gradient(to right, #f9e44a, #2b5ba8, #f9e44a, #2b5ba8, #f9e44a); position:fixed; bottom:0; left:0;"></div>

</body>
</html>
